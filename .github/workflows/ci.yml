name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: rebuild

jobs:
  verify:
    name: build + test (unit + e2e + a11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: rebuild/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Unit contracts (Vitest)
        run: npm run test:unit

      - name: Behavior + a11y contracts (Playwright + axe)
        run: npm run test:e2e
